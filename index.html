<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cpac2d.bin Extractor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3d;
    --accent: #ff6b35;
    --accent2: #ff9a6c;
    --text: #e8eaf0;
    --muted: #7a8099;
    --success: #4ecdc4;
    --danger: #ff4757;
    --card-bg: #12151e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
  }
  .scanline {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  }
  .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 3rem; }
  .logo {
    font-size: 2.8rem; font-weight: 900; letter-spacing: -1px;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(255,107,53,0.3);
    font-family: 'Courier New', monospace;
  }
  .logo span { color: var(--text); }
  .subtitle {
    font-size: 0.78rem; letter-spacing: 0.25em; color: var(--muted);
    text-transform: uppercase; margin-top: 0.5rem;
  }
  .badge {
    display: inline-block; background: var(--surface2); border: 1px solid var(--border);
    font-size: 0.7rem; padding: 2px 10px; border-radius: 2px; color: var(--accent);
    letter-spacing: 0.1em; margin-top: 0.75rem;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 4rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--card-bg);
    position: relative;
    overflow: hidden;
  }
  .drop-zone::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,107,53,0.04), transparent);
    animation: sweep 3s ease-in-out infinite;
  }
  @keyframes sweep { 0%{left:-60%} 100%{left:120%} }
  .drop-zone:hover, .drop-zone.over {
    border-color: var(--accent);
    background: rgba(255,107,53,0.04);
  }
  .drop-icon {
    font-size: 3.5rem; display: block; margin-bottom: 1rem;
    color: var(--accent); filter: drop-shadow(0 0 12px rgba(255,107,53,0.4));
  }
  .drop-title { font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; }
  .drop-sub { font-size: 0.8rem; color: var(--muted); }
  input[type=file] { display: none; }

  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: var(--border); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; margin: 1.5rem 0;
  }
  .stat {
    background: var(--surface); padding: 0.75rem 1rem;
    text-align: center;
  }
  .stat-val { font-size: 1.4rem; color: var(--accent); font-weight: 900; }
  .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; }

  .controls {
    display: flex; gap: 0.75rem; align-items: center;
    flex-wrap: wrap; margin-bottom: 1.5rem;
  }
  .btn {
    padding: 0.5rem 1.25rem; border-radius: 4px; cursor: pointer;
    font-family: 'Courier New', monospace; font-size: 0.8rem; letter-spacing: 0.05em;
    border: 1px solid var(--border); transition: all 0.15s; text-transform: uppercase;
  }
  .btn-primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--text); }
  .btn-ghost:hover { background: var(--surface2); border-color: var(--muted); }
  .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: rgba(255,71,87,0.08); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .search-box {
    flex: 1; min-width: 180px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.5rem 0.75rem;
    color: var(--text); font-family: 'Courier New', monospace; font-size: 0.8rem;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .progress-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 1.5rem;
  }
  .progress-bar {
    height: 100%; background: var(--accent); width: 0%;
    transition: width 0.2s; box-shadow: 0 0 8px rgba(255,107,53,0.5);
  }

  .log {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.75rem 1rem; margin-bottom: 1.5rem;
    font-size: 0.72rem; color: var(--muted); max-height: 90px; overflow-y: auto;
    line-height: 1.7;
  }
  .log .ok { color: var(--success); }
  .log .err { color: var(--danger); }
  .log .info { color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }
  .tile {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px; cursor: pointer;
    transition: all 0.15s; position: relative; overflow: hidden;
  }
  .tile:hover {
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(255,107,53,0.15);
    transform: translateY(-1px);
  }
  .tile.selected { border-color: var(--accent); background: rgba(255,107,53,0.06); }
  .tile-img {
    width: 100%; aspect-ratio: 1;
    image-rendering: pixelated;
    display: block; border-radius: 3px;
    background: #090b10;
  }
  .tile-name {
    font-size: 0.6rem; color: var(--muted); margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-align: center;
  }
  .tile-dim {
    font-size: 0.55rem; color: var(--accent); text-align: center;
  }
  .tile-sel {
    position: absolute; top: 4px; right: 4px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); display: none;
    align-items: center; justify-content: center; font-size: 9px; color: #fff;
  }
  .tile.selected .tile-sel { display: flex; }

  .empty {
    text-align: center; padding: 4rem; color: var(--muted); font-size: 0.8rem;
  }

  #lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    z-index: 999; align-items: center; justify-content: center;
    padding: 1rem;
  }
  #lightbox.open { display: flex; }
  .lb-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; max-width: 520px; width: 100%; padding: 1.5rem;
  }
  .lb-img {
    image-rendering: pixelated;
    max-width: 100%; max-height: 350px; display: block;
    margin: 0 auto; background: #090b10; border-radius: 4px;
  }
  .lb-meta {
    margin-top: 1rem; font-size: 0.72rem; color: var(--muted);
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
  }
  .lb-meta span { color: var(--text); }
  .lb-actions { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end; }
  .lb-close {
    position: absolute; top: 1rem; right: 1.5rem;
    background: none; border: none; color: var(--muted);
    font-size: 1.5rem; cursor: pointer; z-index: 1000;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-header {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--muted); margin-bottom: 1rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .section-header::before {
    content: ''; width: 3px; height: 14px;
    background: var(--accent); display: block; border-radius: 2px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="scanline"></div>
<div id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">×</button>
  <div class="lb-box">
    <canvas id="lb-canvas" class="lb-img"></canvas>
    <div class="lb-meta" id="lb-meta"></div>
    <div class="lb-actions">
      <button class="btn btn-ghost" onclick="closeLightbox()">close</button>
      <button class="btn btn-primary" onclick="downloadCurrent()">↓ save png</button>
    </div>
  </div>
</div>

<div class="container">
  <header>
    <div class="logo">cpac<span>2d</span>.bin</div>
    <div class="subtitle">Apollo Justice — 2D Asset Extractor</div>
    <div class="badge">NDS · Capcom Archive Format</div>
  </header>

  <div id="upload-zone">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <span class="drop-icon">📦</span>
      <div class="drop-title">drop cpac2d.bin here</div>
      <div class="drop-sub">or click to browse · accepts any .bin Capcom 2D archive</div>
    </div>
    <input type="file" id="file-input" accept=".bin">
  </div>

  <div id="result-zone" class="hidden">
    <div class="stats-bar">
      <div class="stat"><div class="stat-val" id="stat-total">0</div><div class="stat-label">images</div></div>
      <div class="stat"><div class="stat-val" id="stat-ok">0</div><div class="stat-label">decoded</div></div>
      <div class="stat"><div class="stat-val" id="stat-err">0</div><div class="stat-label">errors</div></div>
      <div class="stat"><div class="stat-val" id="stat-size">—</div><div class="stat-label">file size</div></div>
    </div>

    <div class="log" id="log"></div>

    <div class="progress-wrap hidden" id="prog-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="controls">
      <input type="text" class="search-box" id="search" placeholder="filter by name or dimensions…">
      <button class="btn btn-primary" id="btn-zip" onclick="downloadZip()">↓ download all as .zip</button>
      <button class="btn btn-ghost" onclick="selectAll()">select all</button>
      <button class="btn btn-ghost" onclick="selectNone()">deselect all</button>
      <button class="btn btn-primary" id="btn-sel-zip" onclick="downloadSelected()" disabled>↓ download selected</button>
      <button class="btn btn-danger" onclick="resetTool()">× reset</button>
    </div>

    <div class="section-header" id="grid-header">extracted images</div>
    <div class="grid" id="image-grid"></div>
  </div>
</div>

<script>
const images = [];
let lbIdx = -1;

function logMsg(msg, cls='') {
  const log = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(2) + ' MB';
}

document.getElementById('drop-zone').addEventListener('dragover', e => {
  e.preventDefault();
  e.currentTarget.classList.add('over');
});
document.getElementById('drop-zone').addEventListener('dragleave', e => {
  e.currentTarget.classList.remove('over');
});
document.getElementById('drop-zone').addEventListener('drop', e => {
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
});
document.getElementById('search').addEventListener('input', filterGrid);

async function processFile(file) {
  document.getElementById('upload-zone').classList.add('hidden');
  document.getElementById('result-zone').classList.remove('hidden');
  document.getElementById('stat-size').textContent = fmtSize(file.size);
  logMsg(`loading: ${file.name} (${fmtSize(file.size)})`, 'info');

  const buf = await file.arrayBuffer();
  const view = new DataView(buf);
  const u8 = new Uint8Array(buf);

  // Try to parse the archive
  extractArchive(view, u8, buf);
}

function extractArchive(view, u8, buf) {
  const progWrap = document.getElementById('prog-wrap');
  progWrap.classList.remove('hidden');

  // The cpac2d.bin header structure:
  // 0x00: uint32 header_size (usually 0x30)
  // 0x04: uint32 total_file_size
  // 0x08-0x2F: rest of header (file count etc.)
  // Files are stored sequentially; we scan for valid image headers

  const headerSize = view.getUint32(0, true);
  const totalSize = view.getUint32(4, true);

  logMsg(`archive header: ${headerSize} bytes, reported size: ${fmtSize(totalSize)}`);

  // Strategy 1: Check if there's a file table at the header
  // Some variants store file count at offset 8
  let fileCount = view.getUint32(8, true);
  
  // Sanity check file count
  if (fileCount === 0 || fileCount > 10000) {
    // Try reading from different offset
    fileCount = view.getUint16(8, true);
  }
  logMsg(`estimated file entries: ${fileCount}`, 'info');

  // Try to find file offsets — scan for image headers
  // Each image entry starts with 0x14 (20) byte header:
  // [0x00] uint32: header_size (0x14)
  // [0x04] uint32: palette_offset (relative to start of entry)
  // [0x08] uint32: palette_size (in bytes, = numColors * 2)
  // [0x0C] uint32: image_data_offset (relative to start of entry)
  // [0x10] uint32: image_data_size

  // Additionally look for NNNN (Nintendo) format sub-images
  const entries = [];

  // Method 1: Use file table if header is valid
  let usedTable = false;
  if (headerSize === 0x30 || headerSize === 0x14 || headerSize === 0x18 || headerSize === 0x20) {
    // Try to parse a file offset table starting at headerSize
    // Some cpac2d formats have: [numFiles][offsets...] right after header
    try {
      const possibleCount = view.getUint32(headerSize, true);
      if (possibleCount > 0 && possibleCount <= 5000) {
        for (let i = 0; i < possibleCount; i++) {
          const off = view.getUint32(headerSize + 4 + i * 4, true);
          if (off < buf.byteLength - 0x14) {
            entries.push(off);
          }
        }
        if (entries.length > 10) {
          logMsg(`file table found: ${entries.length} entries`, 'ok');
          usedTable = true;
        }
      }
    } catch(e) {}
  }

  // Method 2: Scan linearly for valid image headers
  if (!usedTable || entries.length === 0) {
    entries.length = 0;
    logMsg('scanning for image headers…', 'info');
    scanForImages(view, u8, buf, entries);
  }

  if (entries.length === 0) {
    logMsg('no valid image headers found — trying deep scan…', 'err');
    deepScan(view, u8, buf, entries);
  }

  document.getElementById('stat-total').textContent = entries.length;
  logMsg(`found ${entries.length} image offsets`, entries.length > 0 ? 'ok' : 'err');

  let ok = 0, err = 0;
  const grid = document.getElementById('image-grid');
  grid.innerHTML = '';
  images.length = 0;

  for (let i = 0; i < entries.length; i++) {
    const pct = Math.round((i / entries.length) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';

    try {
      const imgData = decodeImage(view, u8, entries[i], i);
      if (imgData) {
        images.push(imgData);
        addTile(imgData, images.length - 1);
        ok++;
      } else {
        err++;
      }
    } catch(e) {
      err++;
      if (err <= 5) logMsg(`entry ${i}: ${e.message}`, 'err');
    }
  }

  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('stat-ok').textContent = ok;
  document.getElementById('stat-err').textContent = err;
  logMsg(`done: ${ok} images decoded, ${err} errors`, ok > 0 ? 'ok' : 'err');

  if (ok === 0) {
    document.getElementById('image-grid').innerHTML =
      '<div class="empty">⚠ Could not decode images from this file.<br>This tool supports Apollo Justice DS (cpac2d.bin) Capcom archive format.</div>';
  }
}

function scanForImages(view, u8, buf, entries) {
  // Walk through the buffer looking for valid 0x14-byte image headers
  // Heuristic: header_len=0x14, palette_offset in reasonable range, palette_size multiple of 2
  const len = buf.byteLength;
  let offset = 0x30; // skip archive header

  while (offset < len - 0x14) {
    try {
      const hdrLen = view.getUint32(offset, true);
      const palOff = view.getUint32(offset + 4, true);
      const palSize = view.getUint32(offset + 8, true);
      const imgOff = view.getUint32(offset + 12, true);
      const imgSize = view.getUint32(offset + 16, true);

      const isValidHeader = (
        hdrLen === 0x14 &&
        palOff >= 0x14 && palOff < 0x10000 &&
        palSize > 0 && palSize <= 0x800 && (palSize % 2 === 0) &&
        imgOff >= palOff + palSize && imgOff < 0x20000 &&
        imgSize > 0 && imgSize < 0x100000 &&
        offset + imgOff + imgSize <= len
      );

      if (isValidHeader) {
        entries.push(offset);
        offset += imgOff + imgSize;
        // Align to 4 bytes
        while (offset % 4 !== 0) offset++;
        continue;
      }
    } catch(e) {}
    offset += 4;
  }
}

function deepScan(view, u8, buf, entries) {
  // Alternative: check for NCLR (palette) or NCGR (char data) Nintendo formats
  // embedded inside the Capcom container
  const len = buf.byteLength;
  const sig1 = [0x52, 0x4C, 0x43, 0x4E]; // RLCN = NCLR reversed
  const sig2 = [0x52, 0x47, 0x43, 0x4E]; // RGCN = NCGR reversed

  for (let i = 0; i < len - 4; i++) {
    if (u8[i]===sig2[0] && u8[i+1]===sig2[1] && u8[i+2]===sig2[2] && u8[i+3]===sig2[3]) {
      entries.push(i);
      i += 4;
    }
  }

  if (entries.length > 0) {
    logMsg(`found ${entries.length} NCGR Nintendo format entries`, 'ok');
  }
}

function decodeImage(view, u8, offset, idx) {
  const bufLen = u8.length;

  // Check if it looks like a standard Capcom image header
  const hdrLen = view.getUint32(offset, true);

  if (hdrLen === 0x14) {
    return decodeCapcomImage(view, u8, offset, idx);
  }

  // Try NCGR format (Nintendo DS tile format)
  if (u8[offset]===0x52 && u8[offset+1]===0x47 && u8[offset+2]===0x43 && u8[offset+3]===0x4E) {
    return null; // Would need separate NCLR palette — skip for now
  }

  return null;
}

function decodeCapcomImage(view, u8, offset, idx) {
  // Header layout (all little-endian uint32):
  // +0x00: header_size (=0x14)
  // +0x04: palette_offset (from start of entry)
  // +0x08: palette_size (numColors * 2, BGR555 format)
  // +0x0C: image_data_offset (from start of entry)
  // +0x10: image_data_size

  const hdrLen    = view.getUint32(offset + 0x00, true);
  const palOff    = view.getUint32(offset + 0x04, true);
  const palSize   = view.getUint32(offset + 0x08, true);
  const imgOff    = view.getUint32(offset + 0x0C, true);
  const imgSize   = view.getUint32(offset + 0x10, true);

  const numColors = palSize / 2;
  const is4bpp = numColors <= 16;
  const is8bpp = numColors > 16 && numColors <= 256;

  if (!is4bpp && !is8bpp) {
    throw new Error(`unexpected palette size: ${numColors} colors`);
  }

  // Parse BGR555 palette
  const palette = [];
  const palBase = offset + palOff;
  for (let c = 0; c < numColors; c++) {
    const raw = view.getUint16(palBase + c * 2, true);
    const r = (raw & 0x1F) << 3;
    const g = ((raw >> 5) & 0x1F) << 3;
    const b = ((raw >> 10) & 0x1F) << 3;
    palette.push([r, g, b]);
  }

  // Pixel data
  const pixBase = offset + imgOff;
  const pixData = u8.subarray(pixBase, pixBase + imgSize);

  // Determine width/height
  // NDS tile data is stored in 8×8 tiles
  // Total pixels = imgSize * (8 or 2) depending on bpp
  let totalPixels;
  if (is4bpp) {
    totalPixels = imgSize * 2; // 2 pixels per byte
  } else {
    totalPixels = imgSize; // 1 pixel per byte
  }

  // Common NDS sprite dimensions — pick best fit
  const dims = guessDimensions(totalPixels);
  const width = dims[0], height = dims[1];

  if (width === 0 || height === 0) {
    throw new Error(`can't determine dimensions for ${totalPixels} pixels`);
  }

  // Build RGBA pixel array (untiled: 8×8 tile order)
  const rgba = new Uint8ClampedArray(width * height * 4);
  const tileW = 8, tileH = 8;
  const tilesX = Math.ceil(width / tileW);
  const tilesY = Math.ceil(height / tileH);

  let byteIdx = 0;

  for (let ty = 0; ty < tilesY; ty++) {
    for (let tx = 0; tx < tilesX; tx++) {
      for (let py = 0; py < tileH; py++) {
        for (let px = 0; px < tileW; px += (is4bpp ? 2 : 1)) {
          const screenX = tx * tileW + px;
          const screenY = ty * tileH + py;

          if (is4bpp) {
            if (byteIdx >= pixData.length) break;
            const byte = pixData[byteIdx++];
            const ci0 = byte & 0x0F;
            const ci1 = (byte >> 4) & 0x0F;

            for (let sub = 0; sub < 2; sub++) {
              const sx = screenX + sub;
              if (sx < width && screenY < height) {
                const pi = (screenY * width + sx) * 4;
                const ci = sub === 0 ? ci0 : ci1;
                const col = ci < palette.length ? palette[ci] : [0,0,0];
                rgba[pi]   = col[0];
                rgba[pi+1] = col[1];
                rgba[pi+2] = col[2];
                rgba[pi+3] = ci === 0 ? 0 : 255; // color 0 = transparent
              }
            }
          } else {
            if (byteIdx >= pixData.length) break;
            const ci = pixData[byteIdx++];
            if (screenX < width && screenY < height) {
              const pi = (screenY * width + screenX) * 4;
              const col = ci < palette.length ? palette[ci] : [0,0,0];
              rgba[pi]   = col[0];
              rgba[pi+1] = col[1];
              rgba[pi+2] = col[2];
              rgba[pi+3] = ci === 0 ? 0 : 255;
            }
          }
        }
      }
    }
  }

  // Render to canvas to get PNG data URL
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  const imgDataObj = new ImageData(rgba, width, height);
  ctx.putImageData(imgDataObj, 0, 0);
  const dataUrl = canvas.toDataURL('image/png');

  return {
    name: `img_${String(idx).padStart(4,'0')}`,
    width, height,
    bpp: is4bpp ? 4 : 8,
    numColors,
    dataUrl,
    canvas,
    offset,
    totalPixels
  };
}

function guessDimensions(totalPixels) {
  // Common NDS sprite/BG sizes (multiples of 8)
  const preferred = [
    [256, 192], [256, 256], [192, 256], [512, 192], [192, 512],
    [128, 128], [64, 64], [32, 32], [16, 16], [8, 8],
    [64, 32], [32, 64], [128, 64], [64, 128],
    [256, 128], [128, 256], [512, 256], [256, 512],
    [32, 16], [16, 32], [24, 24], [48, 48], [96, 96], [160, 160],
    [128, 96], [96, 128], [80, 80], [40, 40], [72, 72],
    [320, 240], [512, 384],
  ];

  for (const [w, h] of preferred) {
    if (w * h === totalPixels) return [w, h];
  }

  // Try square root
  const sq = Math.round(Math.sqrt(totalPixels));
  if (sq * sq === totalPixels && sq % 8 === 0) return [sq, sq];

  // Find best rectangular fit (width >= height, both multiples of 8)
  for (let w = 512; w >= 8; w -= 8) {
    if (totalPixels % w === 0) {
      const h = totalPixels / w;
      if (h >= 8 && h <= 512 && h % 8 === 0) return [w, h];
    }
  }

  // Fallback: just make width = next power of 2
  let w = 8;
  while (w * w < totalPixels) w *= 2;
  const h = Math.ceil(totalPixels / w);
  if (w > 0 && h > 0) return [w, h];

  return [0, 0];
}

function addTile(img, idx) {
  const grid = document.getElementById('image-grid');
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.dataset.idx = idx;
  tile.dataset.name = img.name;
  tile.dataset.dims = `${img.width}×${img.height}`;

  const canvas = document.createElement('canvas');
  canvas.className = 'tile-img';
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img.canvas, 0, 0);

  const sel = document.createElement('div');
  sel.className = 'tile-sel';
  sel.textContent = '✓';

  const name = document.createElement('div');
  name.className = 'tile-name';
  name.textContent = img.name + '.png';

  const dim = document.createElement('div');
  dim.className = 'tile-dim';
  dim.textContent = `${img.width}×${img.height} · ${img.bpp}bpp`;

  tile.appendChild(canvas);
  tile.appendChild(sel);
  tile.appendChild(name);
  tile.appendChild(dim);

  tile.addEventListener('click', (e) => {
    if (e.shiftKey || e.ctrlKey || e.metaKey) {
      tile.classList.toggle('selected');
      updateSelZip();
    } else {
      openLightbox(idx);
    }
  });

  grid.appendChild(tile);
}

function openLightbox(idx) {
  lbIdx = idx;
  const img = images[idx];
  const canvas = document.getElementById('lb-canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img.canvas, 0, 0);

  document.getElementById('lb-meta').innerHTML = `
    <div>name</div><div><span>${img.name}.png</span></div>
    <div>size</div><div><span>${img.width} × ${img.height}</span></div>
    <div>depth</div><div><span>${img.bpp}bpp</span></div>
    <div>colors</div><div><span>${img.numColors}</span></div>
    <div>pixels</div><div><span>${img.totalPixels.toLocaleString()}</span></div>
    <div>offset</div><div><span>0x${img.offset.toString(16).toUpperCase()}</span></div>
  `;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

function downloadCurrent() {
  if (lbIdx < 0) return;
  const img = images[lbIdx];
  const a = document.createElement('a');
  a.href = img.dataUrl;
  a.download = img.name + '.png';
  a.click();
}

async function downloadZip() {
  const btn = document.getElementById('btn-zip');
  btn.disabled = true;
  btn.textContent = 'packing…';
  await buildZip(images);
  btn.disabled = false;
  btn.textContent = '↓ download all as .zip';
}

async function downloadSelected() {
  const selected = [...document.querySelectorAll('.tile.selected')]
    .map(t => images[parseInt(t.dataset.idx)]);
  if (!selected.length) return;
  await buildZip(selected);
}

async function buildZip(imgs) {
  const zip = new JSZip();
  for (const img of imgs) {
    const dataUrl = img.dataUrl;
    const base64 = dataUrl.split(',')[1];
    zip.file(img.name + '.png', base64, { base64: true });
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cpac2d_extracted.zip';
  a.click();
  URL.revokeObjectURL(url);
}

function selectAll() {
  document.querySelectorAll('.tile').forEach(t => t.classList.add('selected'));
  updateSelZip();
}

function selectNone() {
  document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
  updateSelZip();
}

function updateSelZip() {
  const n = document.querySelectorAll('.tile.selected').length;
  const btn = document.getElementById('btn-sel-zip');
  btn.disabled = n === 0;
  btn.textContent = n > 0 ? `↓ download ${n} selected` : '↓ download selected';
}

function filterGrid() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.tile').forEach(t => {
    const match = t.dataset.name.includes(q) || t.dataset.dims.includes(q);
    t.style.display = match ? '' : 'none';
  });
}

function resetTool() {
  document.getElementById('result-zone').classList.add('hidden');
  document.getElementById('upload-zone').classList.remove('hidden');
  document.getElementById('image-grid').innerHTML = '';
  document.getElementById('log').innerHTML = '';
  document.getElementById('file-input').value = '';
  images.length = 0;
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('prog-wrap').classList.add('hidden');
}
</script>
</body>
</html>
